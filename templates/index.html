<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack Smarter Swarm | AI Pentesting</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="logo">
                <span class="neon-text">HS</span> SWARM
            </div>
            <nav>
                <div class="nav-item active" onclick="showView('dashboard')">Dashboard</div>
                <div class="nav-item" onclick="showView('engagements')">Engagements</div>
                <div class="nav-item" onclick="showView('settings')">Settings</div>
            </nav>
            <div class="history-list">
                <h3>Recent Engagements</h3>
                <div id="historyItems"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header>
                <h1>Autonomous <span class="accent">Recon Swarm</span></h1>
                <div class="status-badge" id="swarmStatus">Standby</div>
            </header>

            <section id="dashboardView" class="view">
                <div class="grid">
                    <!-- Config Card -->
                    <div class="card glass">
                        <h2>Swarm Configuration</h2>
                        <div class="input-group">
                            <label>Target Scope</label>
                            <textarea id="targets" placeholder="example.com, 192.168.1.1, or subdomains.txt..."></textarea>
                        </div>
                        <div class="input-group">
                            <label>Client / Engagement Name</label>
                            <input type="text" id="clientName" placeholder="Acme_Pentest_2024">
                        </div>
                        
                        <h3>Tool Exclusions</h3>
                        <div class="tool-chips">
                            <label class="chip"><input type="checkbox" value="nuclei"> Nuclei</label>
                            <label class="chip"><input type="checkbox" value="ferox"> Feroxbuster</label>
                            <label class="chip"><input type="checkbox" value="wpscan"> WPScan</label>
                            <label class="chip"><input type="checkbox" value="nmap"> Nmap</label>
                        </div>

                        <button id="deployBtn" class="primary-btn pulse" onclick="deploySwarm()">DEPLOY SWARM</button>
                    </div>

                    <!-- Live Terminal Card -->
                    <div class="card glass terminal-container">
                        <div class="terminal-header">
                            <h2>Swarm Intelligence Terminal</h2>
                            <button id="skipBtn" class="skip-btn hidden" onclick="skipTask()">SKIP TASK</button>
                        </div>
                        <div id="terminal" class="terminal-body">
                            <div class="log-line system">[*] Ready for deployment.</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Report View (Hidden by default) -->
            <section id="reportView" class="view hidden">
                <div class="card glass report-content">
                    <button class="small-btn" onclick="showView('dashboard')">&larr; Back to Swarm</button>
                    <div id="markdownArea"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
